# Bone pre-training config (Stage 1 — VAE only).
#
# Trains HierarchicalVAE on proxy modern bone datasets (ICL femur/tibia,
# VerSe vertebrae, BoneDat pelvis).  Diffusion and conditioning modules
# are frozen (BonePretrainer mode).
#
# Run:
#   python -m src.training.trainer --config experiments/pretrain_bone.yaml --mode pretrain
#
# After this finishes, use the best checkpoint as --checkpoint for
# experiments/finetune_fossil.yaml.

model: relic

vae:
  z_global_dim: 256
  z_local_dim: 64
  k_local: 128
  n_points_out: 4096
  d_model: 256
  n_proxies: 256
  k_local_enc: 16
  n_proxy_layers: 2
  n_global_layers: 4
  use_symmetry: true
  confidence_threshold: 0.25
  n_ransac: 100

diffusion:
  type: ddpm
  T: 100
  ddim_steps: 20
  t_emb_dim: 128
  beta_start: 1.0e-4
  beta_end: 0.02
  guidance_scale: 3.0

conditioning:
  phylo_embedding: poincare
  phylo_dim: 64
  morpho_encoder: biobert
  morpho_dim: 256
  image_encoder: clip
  image_dim: 256
  out_dim: 256
  n_taxa: 1024

symmetry:
  enabled: true
  confidence_threshold: 0.25

# Use the general fossil dataset pointing at proxy preprocessed data
dataset: fossil
n_points: 4096
n_partial: 2048
batch_size: 16           # smaller batch; proxy set is small (~700 specimens)
seed: 42

training:
  lr: 1.0e-4
  lr_min: 1.0e-6
  weight_decay: 1.0e-4
  epochs: 100
  warmup_epochs: 5
  mixed_precision: true
  grad_accum_steps: 2    # effective batch = 32
  clip_grad_norm: 1.0
  save_every: 10
  top_k_checkpoints: 3
  checkpoint_dir: checkpoints/pretrain_bone
  use_wandb: false
  wandb_project: relic-fossil
  run_name: pretrain_bone

  loss_weights:
    cd_l1: 1.0
    normal_con: 0.1
    symmetry: 0.1
    kl: 0.01
    diffusion: 0.0       # diffusion frozen in pretrain mode
    fidelity: 0.5

  beta_max: 0.01
  beta_warmup: 2000

data:
  processed_dir: data/processed
  num_workers: 4
